<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  (function(){
  emailjs.init("q9gQ97qjO3F2phi3n"); // replace with your key
  })();
  const nameInput = document.getElementById('name');
  const emailInput = document.getElementById('email');
  const messageInput = document.getElementById('message');
  const sendBtn = document.getElementById('send-btn');

  function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;

  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 3000); // disappears after 3 sec
}

function isValidEmail(email) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return regex.test(email);
}

  function checkForm() {
    if (
      nameInput.value.trim() !== '' &&
      emailInput.value.trim() !== '' &&
      messageInput.value.trim() !== ''
    ) {
      sendBtn.disabled = false;
      sendBtn.classList.add('enabled');
    } else {
      sendBtn.disabled = true;
      sendBtn.classList.remove('enabled');
    }
  }

  nameInput.addEventListener('input', checkForm);
  emailInput.addEventListener('input', checkForm);
  messageInput.addEventListener('input', checkForm);

  // REMOVE ERROR WHEN USER TYPES AGAIN
function removeError(input) {
  input.parentElement.classList.remove("input-error");
}

nameInput.addEventListener("input", () => removeError(nameInput));
emailInput.addEventListener("input", () => removeError(emailInput));
messageInput.addEventListener("input", () => removeError(messageInput));

  sendBtn.addEventListener("click", function(e) {
  e.preventDefault();

  const emailValue = emailInput.value.trim();

  // ❌ EMAIL VALIDATION CHECK
  if (!isValidEmail(emailValue)) {
    showToast("Please enter a valid email address ❌");
    emailInput.parentElement.classList.add("input-error");
    return;
  }

  let templateParams = {
    name: nameInput.value,
    email: emailValue,
    message: messageInput.value
  };

  sendBtn.innerText = "Sending...";
  sendBtn.disabled = true;

  emailjs.send(
    "service_6ruy5wm",
    "template_xj2jorw",
    templateParams
  )
  .then(function() {
    showToast("Message Sent Successfully! 🎉");

    nameInput.value = "";
    emailInput.value = "";
    messageInput.value = "";

    sendBtn.innerText = "Send";
    sendBtn.disabled = true;
    sendBtn.classList.remove('enabled');
  })
  .catch(function(error) {
  showToast("Failed to send message ❌");

  // ADD RED BORDER
  nameInput.parentElement.classList.add("input-error");
  emailInput.parentElement.classList.add("input-error");
  messageInput.parentElement.classList.add("input-error");

  sendBtn.innerText = "Send";
  sendBtn.disabled = false;

  console.error(error);
});
});
</script>
